<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tiệc tối nay</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, #fff7ed, #ffe4e6);
        overflow: hidden;
      }

      .container {
        text-align: center;
        padding: 40px 24px;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 28px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
        max-width: 680px;
        width: calc(100% - 32px);
        animation: floatIn 0.9s ease-out;
      }

      h1 {
        font-size: clamp(28px, 4vw, 42px);
        line-height: 1.4;
        margin: 0 0 28px;
      }

      .buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        margin-top: 10px;
        position: relative;
      }

      button {
        border: none;
        padding: 14px 30px;
        min-width: 120px;
        border-radius: 999px;
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.25s ease;
      }

      button:hover {
        transform: translateY(-4px);
        box-shadow: 0 14px 25px rgba(0, 0, 0, 0.15);
      }

      .yes {
        background: linear-gradient(135deg, #22c55e, #16a34a);
        scale: 1.1;
        color: white;
      }

      .no {
        background: linear-gradient(135deg, #f87171, #ef4444);
        color: white;
        scale: 0.9;
        position: relative;
      }

      .message {
        margin-top: 24px;
        font-size: 18px;
        min-height: 28px;
        font-weight: 600;
      }

      .heart {
        position: fixed;
        font-size: 24px;
        animation: fly 10s linear forwards;
        pointer-events: none;
      }

      @keyframes fly {
        0% {
          transform: translateY(0) scale(0.8);
          opacity: 1;
        }
        100% {
          transform: translateY(-120vh) scale(1.4);
          opacity: 0;
        }
      }

      @keyframes floatIn {
        from {
          opacity: 0;
          transform: translateY(20px) scale(0.96);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @media (max-width: 480px) {
        button {
          width: 100%;
        }
        .buttons {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Em Minnnn tham gia tiệc 8/3 lúc 7:30PM với anh nhé?</h1>

      <div class="buttons" id="buttonArea">
        <button class="yes" id="yesBtn" onclick="answerYes()">Có 😍</button>
        <button class="no" id="noBtn" onclick="answerNo()">Không 🥶</button>
      </div>

      <div class="message" id="message" hidden>
        Tuyệt vời! Hẹn gặp em tối nay nhé 💖 <a href="https://maps.app.goo.gl/mhM1kFScxiLNqwLy7">Nhà hàng ESOLA</a>
      </div>
    </div>

    <script>
      const message = document.getElementById("message");
      const yesBtn = document.getElementById("yesBtn");
      const noBtn = document.getElementById("noBtn");
      const area = document.getElementById("buttonArea");

      let yesScale = 1;
      let noScale = 1;
      let clickCount = 0;
      const noBtnLabels = [
        "Không 🥶",
        "Anh sẽ rất vui nếu em nhận lời ☺️",
        "Ra ngoài thay đổi không khí chút đi! 🥹",
        "Một năm chỉ có một lần thôi đoá.. 😥",
        "Đi màaaaaaa 😭",
        "Em có đi đó 😉",
      ];

      function answerYes() {
        message.hidden = false;
        noBtn.disabled = true;

        createHearts();
      }

      function createHearts() {
        for (let i = 0; i < 100; i++) {
          const heart = document.createElement("div");
          heart.className = "heart";
          heart.textContent = "💖";

          heart.style.left = Math.random() * 100 + "vw";
          heart.style.bottom = "-20px";
          heart.style.fontSize = 20 + Math.random() * 30 + "px";
          heart.style.animationDuration = 2 + Math.random() * 2 + "s";

          document.body.appendChild(heart);

          setTimeout(() => {
            heart.remove();
          }, 4000);
        }
      }

      function answerNo() {
        clickCount++;

        if (clickCount > 5) {
          noBtn.onmouseover = escapeButton;
          noBtn.style.transform = `scale(0.5)`;
          return;
        }

        noBtn.textContent = noBtnLabels[clickCount];

        // nút Không nhỏ dần
        noScale -= 0.15;
        if (noScale < 0.35) noScale = 0.35;

        // nút Có to dần
        yesScale += 0.15;

        noBtn.style.transform = `scale(${noScale})`;
        yesBtn.style.transform = `scale(${yesScale})`;
      }

      function escapeButton() {
        const areaRect = area.getBoundingClientRect();

        const maxX = areaRect.width - noBtn.offsetWidth;
        const maxY = 120;

        const randomX = Math.random() * maxX;
        const randomY = Math.random() * maxY;

        noBtn.style.position = "absolute";
        noBtn.style.left = randomX + "px";
        noBtn.style.top = randomY + "px";
        noBtn.disabled = true;
      }
    </script>
  </body>
</html>
